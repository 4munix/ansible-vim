---
- name: Install required packages
  package:
    name:
      - git
      - vim
    state: present

- name: Create .vim/directories
  file:
    path: "{{ item }}"
    state: directory
    recurse: false
    mode: 0750
    owner: "{{ user if user is defined else 'root' }}"
    group: "{{ user if user is defined else 'root' }}"
  loop:
    - "{{ vim_dir }}"
    - "{{ vim_dir }}/autoload"
    - "{{ vim_dir }}/colors"
    - "{{ vim_dir }}/syntax"

- name: Fetch vimplug, put it in autoload
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/junegunn/vim-plug/master/plug.vim
    dest: "{{ vim_dir }}/autoload/plug.vim"

- name: Copy .vimrc config
  copy:
    src: vimrc
    dest: "{{ vimrc }}"
    backup: true
    mode: 0640
    owner: "{{ user if user is defined else 'root' }}"
    group: "{{ user if user is defined else 'root' }}"

- name: Disable colorscheme
  ansible.builtin.lineinfile:
    path: "{{ vimrc }}"
    regexp: '^(colorscheme.*)'
    line: '" \1'
    backrefs: true
  changed_when: false

- name: vim commands to install plugins
  ansible.builtin.shell: su - {{ user }} -c 'vim -c "PlugInstall" -c "q" -c "q"'
  changed_when: false

- name: Enable colorscheme
  ansible.builtin.lineinfile:
    path: "{{ vimrc }}"
    regexp: ^" colorscheme {{ vim_colorscheme }}
    line: colorscheme {{ vim_colorscheme }}
  changed_when: false
